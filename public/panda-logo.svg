<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" aria-hidden="true">
  <!-- Testa bianca con sfumatura leggera sotto -->
  <defs>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="85%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </linearGradient>
    <linearGradient id="earShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2230"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="bandanaShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
  </defs>
  <!-- Bordo nero spesso -->
  <circle cx="60" cy="60" r="52" fill="url(#face)" stroke="#0d0d0d" stroke-width="3"/>
  <!-- Sottile bordo chiaro interno -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(200,220,255,0.4)" stroke-width="0.8"/>
  <!-- Orecchie nere con sfumatura blu scuro -->
  <circle cx="32" cy="26" r="17" fill="url(#earShade)" stroke="#0d0d0d" stroke-width="2"/>
  <circle cx="88" cy="26" r="17" fill="url(#earShade)" stroke="#0d0d0d" stroke-width="2"/>
  <!-- Bandana nera (tied) con leggera sfumatura in alto -->
  <path d="M28 44 Q60 34 92 44 L88 54 Q60 50 32 54 Z" fill="url(#bandanaShade)" stroke="#0d0d0d" stroke-width="1.5"/>
  <path d="M88 44 L92 50 Q60 46 28 50 L32 44 Q60 38 88 44 Z" fill="#0d0d0d"/>
  <!-- Patch occhi neri ovali -->
  <ellipse cx="40" cy="56" rx="13" ry="11" fill="#0d0d0d"/>
  <ellipse cx="80" cy="56" rx="13" ry="11" fill="#0d0d0d"/>
  <!-- Occhi neri pieni -->
  <ellipse cx="40" cy="56" rx="9" ry="7" fill="#0d0d0d"/>
  <ellipse cx="80" cy="56" rx="9" ry="7" fill="#0d0d0d"/>
  <!-- Riflesso bianco in alto a sinistra di ogni occhio -->
  <circle cx="37" cy="53" r="2.2" fill="white"/>
  <circle cx="77" cy="53" r="2.2" fill="white"/>
  <!-- Naso nero -->
  <ellipse cx="60" cy="72" rx="5" ry="4" fill="#0d0d0d"/>
  <!-- Bocca -->
  <path d="M52 81 Q60 85 68 81" stroke="#0d0d0d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
